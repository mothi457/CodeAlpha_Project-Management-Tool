<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TaskFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0d0d0f; color: #f0f0f2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card { background: #141416; border: 1px solid #2a2a2e; border-radius: 20px; padding: 2rem; width: 100%; max-width: 400px; }
        .logo { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        .logo-icon { width: 32px; height: 32px; background: #7c6aff; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-weight: 800; font-size: 1.1rem; }
        h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
        .sub { color: #9898a8; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: #9898a8; margin-bottom: 0.4rem; }
        .form-control { width: 100%; background: #1c1c1f; border: 1px solid #2a2a2e; border-radius: 8px; padding: 0.65rem 0.85rem; font-family: inherit; font-size: 0.875rem; color: #f0f0f2; outline: none; transition: border-color 0.15s; }
        .form-control:focus { border-color: #7c6aff; }
        .btn-submit { width: 100%; padding: 0.75rem; background: #7c6aff; color: white; border: none; border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s; }
        .btn-submit:hover { background: #5b4fd4; }
        .auth-footer { text-align: center; margin-top: 1.2rem; font-size: 0.85rem; color: #9898a8; }
        .auth-footer a { color: #7c6aff; text-decoration: none; font-weight: 600; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; padding: 0.6rem 0.85rem; border-radius: 8px; font-size: 0.82rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo"><div class="logo-icon">⚡</div><span class="logo-text">TaskFlow</span></div>
        <h2>Welcome back</h2>
        <p class="sub">Login to your TaskFlow account</p>
        {% if messages %}{% for msg in messages %}<div class="error">{{ msg }}</div>{% endfor %}{% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus placeholder="Enter username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn-submit">Login →</button>
        </form>
        <div class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Register</a></div>
    </div>
</body>
</html>
